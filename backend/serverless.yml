service: fullstack-challenge-backend

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-2
  stage: ${opt:stage, 'dev'}
  environment:
    NODE_ENV: production
    DATABASE_URL: ${env:DATABASE_URL, 'postgresql://challenge:challenge@localhost:5432/challenge'}
    FRONTEND_URL: ${env:FRONTEND_URL, 'http://localhost:3000'}

functions:
  api:
    handler: dist/src/lambda.handler
    timeout: 29
    events:
      - httpApi:
          path: /{proxy+}
          method: any
      - httpApi:
          path: /
          method: any

package:
  patterns:
    - '!src/**'
    - '!test/**'
    - '!coverage/**'
    - '!.env*'
    - '!**/*.spec.ts'
    - '!**/*.spec.js'
    - '!README.md'

plugins:
  - serverless-offline

custom:
  serverless-offline:
    httpPort: 3001
    noPretendStageInUrl: true
